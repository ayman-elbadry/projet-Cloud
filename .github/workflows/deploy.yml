name: CI/CD Pipeline for Flask DevOps App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/flask-devops-app
  IMAGE_TAG: latest

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to K3s Master Node
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to K3s via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.MASTER_NODE_IP }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Restart the deployment to pick up the new image
            sudo kubectl rollout restart deployment/flask-app
            
            # 2. Verify rollout status with a timeout to avoid hanging forever
            sudo kubectl rollout status deployment/flask-app --timeout=300s
